  function check(v) {
    let name = v;
    let selector = document.querySelector(`.${name}`);
    let selector2 = document.querySelector(".box9");

    let x1 = parseInt(selector.getAttribute("data-x"));
    let y1 = parseInt(selector.getAttribute("data-y"));

    let x2 = parseInt(selector2.getAttribute("data-x"));
    let y2 = parseInt(selector2.getAttribute("data-y"));

    let check0 = (Math.abs(x1 - x2) === 1 && y1 === y2) || (Math.abs(y1 - y2) === 1 && x1 === x2);

    if (check0) {
        // Swap attributes
        selector.setAttribute("data-x", x2);
        selector.setAttribute("data-y", y2);

        selector2.setAttribute("data-x", x1);
        selector2.setAttribute("data-y", y1);

        // **No need to redeclare x1, y1, x2, y2 again!** Just use updated values.
        selector.style.top = `${y2 * 130 + 10}px`;  // Use y2 (not y1)
        
        selector.style.left = `${x2 * 130 + 10}px`; // Use x2 (not x1)

        selector2.style.top = `${y1 * 130 + 10}px`;  // Use y1 (not y2)
        selector2.style.left = `${x1 * 130 + 10}px`; // Use x1 (not x2)
    }
}

function shuffle(){
    var arr = [1, 2, 3, 4, 5, 6, 7, 8];
    t1 = arr;
    var counter = t1.length;
    while (counter > 0){
        var index = Math.floor(Math.random() * counter);
        counter--;
        var temp = t1[counter];
        t1[counter] = t1[index];
        t1[index] = temp;
    }
    return t1;
}
